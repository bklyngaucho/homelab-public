# =============================================================================
# Recyclarr Configuration
# Syncs TRaSH Guides quality profiles and custom formats to Sonarr and Radarr.
#
# API keys are injected via environment variables — never hardcode them here.
# Docs: https://recyclarr.dev/wiki/
# TRaSH Guides: https://trash-guides.info/
# =============================================================================

sonarr:
  main:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY
    quality_definition:
      type: series
    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
        reset_unmatched_scores:
          enabled: true

radarr:
  # Standard HD movies (Radarr)
  main:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY
    quality_definition:
      type: movie
    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true

  # 4K movies (Radarr4K)
  radarr4k:
    base_url: http://radarr4k:7878
    api_key: !env_var RADARR4K_API_KEY
    quality_definition:
      type: movie
    quality_profiles:
      - trash_id: fd161a61e3ab826d3a22d53f935696dd  # Remux + WEB 2160p
        reset_unmatched_scores:
          enabled: true
